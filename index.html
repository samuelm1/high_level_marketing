<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Emergency Funding | Get Approved in Minutes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Hero Section -->
    <header class="bg-white py-12 px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4">
            Need Emergency Capital <span class="text-emerald-600">Today?</span>
        </h1>
        <p class="text-lg text-slate-600 max-w-2xl mx-auto">
            Fast, secure, and transparent funding solutions for B2B and Consumer emergencies. 
            Get your decision in minutes.
        </p>
    </header>

    <!-- Main Content -->
    <main class="max-w-xl mx-auto px-4 pb-16">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <form id="leadCaptureForm" class="space-y-6">
                <!-- Category Toggle -->
                <div class="grid grid-cols-2 gap-4 bg-slate-100 p-1.5 rounded-2xl">
                    <button type="button" onclick="setLeadType('B2C')" id="btnB2C" class="py-3 rounded-xl font-semibold bg-white shadow-sm text-emerald-700">Personal (B2C)</button>
                    <button type="button" onclick="setLeadType('B2B')" id="btnB2B" class="py-3 rounded-xl font-semibold text-slate-500">Business (B2B)</button>
                </div>
                <input type="hidden" id="lead_type" value="B2C">

                <!-- Inputs -->
                <div class="space-y-4">
                    <input type="text" id="fullname" placeholder="Full Legal Name" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                    <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                    <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <select id="state" class="w-full p-4 rounded-xl border border-slate-200 bg-white">
                            <option value="TX">Texas (TX)</option>
                            <option value="CA">California (CA)</option>
                            <option value="FL">Florida (FL)</option>
                        </select>
                        <input type="number" id="requested_amount" placeholder="Amount ($)" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl text-lg transition transform hover:scale-[1.02]">
                    Check My Eligibility
                </button>
            </form>
            
            <div id="formFeedback" class="hidden mt-6 p-4 rounded-xl text-center text-sm font-medium"></div>
        </div>

        <div class="flex justify-center gap-8 mt-12 text-slate-400 text-sm">
            <span class="flex items-center gap-1">🔒 256-bit SSL Secure</span>
            <span class="flex items-center gap-1">⚡ Instant Decision</span>
        </div>
    </main>

    <script>
        // UPDATE THIS URL TO YOUR LIVE RENDER BACKEND
        const API_BASE_URL = "https://high-level-marketing-1.onrender.com"; 

        function setLeadType(type) {
            document.getElementById('lead_type').value = type;
            const btnB2C = document.getElementById('btnB2C');
            const btnB2B = document.getElementById('btnB2B');
            
            if(type === 'B2B') {
                btnB2B.className = "py-3 rounded-xl font-semibold bg-white shadow-sm text-emerald-700";
                btnB2C.className = "py-3 rounded-xl font-semibold text-slate-500";
            } else {
                btnB2C.className = "py-3 rounded-xl font-semibold bg-white shadow-sm text-emerald-700";
                btnB2B.className = "py-3 rounded-xl font-semibold text-slate-500";
            }
        }

        document.getElementById('leadCaptureForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const feedback = document.getElementById('formFeedback');
            btn.disabled = true;
            btn.innerText = "Processing...";
            feedback.classList.remove('hidden', 'bg-red-100', 'bg-emerald-100', 'text-red-700', 'text-emerald-700');
            feedback.classList.add('bg-blue-50', 'text-blue-700');
            feedback.innerText = "Connecting to Secure Gateway...";

            const payload = {
                lead_type: document.getElementById('lead_type').value,
                fullname: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                state: document.getElementById('state').value,
                requested_amount: parseFloat(document.getElementById('requested_amount').value),
                credit_score: 680, // Defaulting for simple B2C flow, adjust if needed
                monthly_revenue: 0,
                loan_purpose: "emergency"
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/leads`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Connection failed");

                feedback.classList.replace('bg-blue-50', 'bg-emerald-100');
                feedback.classList.replace('text-blue-700', 'text-emerald-700');
                feedback.innerText = "Success! You have been qualified for our premier partner network.";
            } catch (err) {
                feedback.classList.replace('bg-blue-50', 'bg-red-100');
                feedback.classList.replace('text-blue-700', 'text-red-700');
                feedback.innerText = "Transmission error. Please try again.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Check My Eligibility";
            }
        });
    </script>
</body>
</html>
