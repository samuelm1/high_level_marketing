<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO & Meta Tags -->
    <title>Fast Emergency Funding | Get Approved in Minutes</title>
    <meta name="description" content="Secure, rapid emergency capital for businesses and individuals. Apply online in 2 minutes and get instant routing to premier lending partners.">
    <meta name="keywords" content="emergency funding, fast business loan, personal capital, quick cash, secure lending">
    <meta property="og:title" content="Fast Emergency Funding | Get Approved in Minutes">
    <meta property="og:description" content="Secure, rapid emergency capital for businesses and individuals.">
    <meta property="og:type" content="website">
    
    <!-- Performance & Styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Forces mobile browsers to not zoom in on input focus */
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-white py-12 px-4 text-center shadow-sm">
        <h1 class="text-3xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">
            Need Emergency Capital <span class="text-emerald-600">Today?</span>
        </h1>
        <p class="text-slate-500 max-w-lg mx-auto text-sm md:text-base">Fast, secure, and transparent funding solutions. Get your decision in minutes.</p>
    </header>

    <main class="max-w-xl mx-auto px-4 py-8 pb-16">
        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-slate-100">
            <form id="leadCaptureForm" class="space-y-5">
                <div class="grid grid-cols-2 gap-2 bg-slate-100 p-1.5 rounded-2xl">
                    <button type="button" onclick="setLeadType('B2C')" id="btnB2C" class="py-3 rounded-xl font-semibold bg-white shadow-sm text-emerald-700 transition">Personal (B2C)</button>
                    <button type="button" onclick="setLeadType('B2B')" id="btnB2B" class="py-3 rounded-xl font-semibold text-slate-500 transition">Business (B2B)</button>
                </div>
                <input type="hidden" id="lead_type" value="B2C">

                <div class="space-y-4">
                    <input type="text" id="fullname" placeholder="Full Legal Name" class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50 focus:bg-white transition" required>
                    <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50 focus:bg-white transition" required>
                    <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50 focus:bg-white transition" required>
                    <div class="grid grid-cols-2 gap-4">
                        <select id="state" class="w-full p-4 rounded-xl border border-slate-200 bg-white focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                            <option value="" disabled selected>Select State</option>
                            <option value="AL">Alabama (AL)</option>
                            <option value="AK">Alaska (AK)</option>
                            <option value="AZ">Arizona (AZ)</option>
                            <option value="AR">Arkansas (AR)</option>
                            <option value="CA">California (CA)</option>
                            <option value="CO">Colorado (CO)</option>
                            <option value="CT">Connecticut (CT)</option>
                            <option value="DE">Delaware (DE)</option>
                            <option value="FL">Florida (FL)</option>
                            <option value="GA">Georgia (GA)</option>
                            <option value="HI">Hawaii (HI)</option>
                            <option value="ID">Idaho (ID)</option>
                            <option value="IL">Illinois (IL)</option>
                            <option value="IN">Indiana (IN)</option>
                            <option value="IA">Iowa (IA)</option>
                            <option value="KS">Kansas (KS)</option>
                            <option value="KY">Kentucky (KY)</option>
                            <option value="LA">Louisiana (LA)</option>
                            <option value="ME">Maine (ME)</option>
                            <option value="MD">Maryland (MD)</option>
                            <option value="MA">Massachusetts (MA)</option>
                            <option value="MI">Michigan (MI)</option>
                            <option value="MN">Minnesota (MN)</option>
                            <option value="MS">Mississippi (MS)</option>
                            <option value="MO">Missouri (MO)</option>
                            <option value="MT">Montana (MT)</option>
                            <option value="NE">Nebraska (NE)</option>
                            <option value="NV">Nevada (NV)</option>
                            <option value="NH">New Hampshire (NH)</option>
                            <option value="NJ">New Jersey (NJ)</option>
                            <option value="NM">New Mexico (NM)</option>
                            <option value="NY">New York (NY)</option>
                            <option value="NC">North Carolina (NC)</option>
                            <option value="ND">North Dakota (ND)</option>
                            <option value="OH">Ohio (OH)</option>
                            <option value="OK">Oklahoma (OK)</option>
                            <option value="OR">Oregon (OR)</option>
                            <option value="PA">Pennsylvania (PA)</option>
                            <option value="RI">Rhode Island (RI)</option>
                            <option value="SC">South Carolina (SC)</option>
                            <option value="SD">South Dakota (SD)</option>
                            <option value="TN">Tennessee (TN)</option>
                            <option value="TX">Texas (TX)</option>
                            <option value="UT">Utah (UT)</option>
                            <option value="VT">Vermont (VT)</option>
                            <option value="VA">Virginia (VA)</option>
                            <option value="WA">Washington (WA)</option>
                            <option value="WV">West Virginia (WV)</option>
                            <option value="WI">Wisconsin (WI)</option>
                            <option value="WY">Wyoming (WY)</option>
                        </select>
                        <input type="number" id="requested_amount" placeholder="Amount ($)" class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50 focus:bg-white transition" required>
                    </div>
                </div>

                <div class="mt-2 p-4 bg-slate-50 border border-slate-200 rounded-xl text-[11px] text-slate-500 leading-relaxed">
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" id="tcpa_consent" required class="mt-0.5 w-4 h-4 accent-emerald-600">
                        <span>I consent to be contacted via phone, email, and text by this site and its affiliate partners. Consent is not a condition of purchase.</span>
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-600/20 transition transform active:scale-95">
                    Check My Eligibility
                </button>
            </form>
            <div id="formFeedback" class="hidden mt-6 p-4 rounded-xl text-center text-sm font-medium transition-all"></div>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://high-level-marketing-1.onrender.com"; 

        function setLeadType(type) {
            document.getElementById('lead_type').value = type;
            document.getElementById('btnB2C').className = type === 'B2C' ? "py-3 rounded-xl font-semibold bg-white shadow-sm text-emerald-700 transition" : "py-3 rounded-xl font-semibold text-slate-500 transition";
            document.getElementById('btnB2B').className = type === 'B2B' ? "py-3 rounded-xl font-semibold bg-white shadow-sm text-emerald-700 transition" : "py-3 rounded-xl font-semibold text-slate-500 transition";
        }

        const fetchWithTimeout = async (resource, options = {}) => {
            const { timeout = 60000 } = options; 
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            const response = await fetch(resource, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
        };

        document.getElementById('leadCaptureForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('formFeedback');
            const btn = document.getElementById('submitBtn');
            
            btn.disabled = true;
            btn.innerText = "Securing Connection...";
            feedback.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-emerald-50', 'text-emerald-700');
            feedback.classList.add('bg-blue-50', 'text-blue-700', 'animate-pulse');
            feedback.innerText = "Connecting to secure gateway... (This may take up to 30 seconds).";

            const payload = {
                lead_type: document.getElementById('lead_type').value,
                fullname: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                state: document.getElementById('state').value,
                requested_amount: parseFloat(document.getElementById('requested_amount').value),
                credit_score: 680, 
                monthly_revenue: 0,
                loan_purpose: "emergency"
            };

            try {
                const response = await fetchWithTimeout(`${API_BASE_URL}/api/v1/leads`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                    timeout: 60000 
                });
                
                if (response.ok) {
                    feedback.className = "mt-6 p-4 rounded-xl text-center text-sm font-medium bg-emerald-50 text-emerald-700";
                    feedback.innerText = "Success! Your application has been securely routed.";
                    document.getElementById('leadCaptureForm').reset();
                } else {
                    throw new Error("Server rejected request");
                }
            } catch (err) { 
                feedback.className = "mt-6 p-4 rounded-xl text-center text-sm font-medium bg-red-50 text-red-700";
                feedback.innerText = err.name === 'AbortError' ? "Connection timed out. Please try again." : "Transmission error. Please try again.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Check My Eligibility";
            }
        });
    </script>
</body>
</html>
