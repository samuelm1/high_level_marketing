<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Emergency Funding | Get Approved in Minutes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-white py-12 px-4 text-center">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-4">
            Need Emergency Capital <span class="text-emerald-600">Today?</span>
        </h1>
    </header>

    <main class="max-w-xl mx-auto px-4 pb-16">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <form id="leadCaptureForm" class="space-y-6">
                <!-- Toggle -->
                <div class="grid grid-cols-2 gap-4 bg-slate-100 p-1.5 rounded-2xl">
                    <button type="button" onclick="setLeadType('B2C')" id="btnB2C" class="py-3 rounded-xl font-semibold bg-white shadow-sm text-emerald-700">Personal (B2C)</button>
                    <button type="button" onclick="setLeadType('B2B')" id="btnB2B" class="py-3 rounded-xl font-semibold text-slate-500">Business (B2B)</button>
                </div>
                <input type="hidden" id="lead_type" value="B2C">

                <!-- Inputs -->
                <div class="space-y-4">
                    <input type="text" id="fullname" placeholder="Full Legal Name" class="w-full p-4 rounded-xl border border-slate-200 outline-none" required>
                    <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-xl border border-slate-200 outline-none" required>
                    <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-4 rounded-xl border border-slate-200 outline-none" required>
                    <div class="grid grid-cols-2 gap-4">
                        <select id="state" class="w-full p-4 rounded-xl border border-slate-200 bg-white">
                            <option value="TX">TX</option><option value="CA">CA</option><option value="FL">FL</option>
                        </select>
                        <input type="number" id="requested_amount" placeholder="Amount ($)" class="w-full p-4 rounded-xl border border-slate-200 outline-none" required>
                    </div>
                </div>

                <!-- TCPA Compliance -->
                <div class="mt-4 p-4 bg-slate-50 border border-slate-200 rounded-xl text-[10px] text-slate-500 leading-relaxed">
                    <label class="flex items-start gap-2 cursor-pointer">
                        <input type="checkbox" id="tcpa_consent" required class="mt-1 accent-emerald-600">
                        <span>I consent to be contacted via phone/email/text by this site and its affiliate partners. Consent is not a condition of purchase.</span>
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition">
                    Check My Eligibility
                </button>
            </form>
            <div id="formFeedback" class="hidden mt-6 p-4 rounded-xl text-center text-sm font-medium"></div>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://high-level-marketing-1.onrender.com";  

        function setLeadType(type) {
            document.getElementById('lead_type').value = type;
            document.getElementById('btnB2C').className = type === 'B2C' ? "py-3 rounded-xl font-semibold bg-white shadow-sm text-emerald-700" : "py-3 rounded-xl font-semibold text-slate-500";
            document.getElementById('btnB2B').className = type === 'B2B' ? "py-3 rounded-xl font-semibold bg-white shadow-sm text-emerald-700" : "py-3 rounded-xl font-semibold text-slate-500";
        }

        document.getElementById('leadCaptureForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('formFeedback');
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            feedback.innerText = "Processing...";
            feedback.classList.remove('hidden');

            const payload = {
                lead_type: document.getElementById('lead_type').value,
                fullname: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                state: document.getElementById('state').value,
                requested_amount: parseFloat(document.getElementById('requested_amount').value),
                tcpa_consent: document.getElementById('tcpa_consent').checked
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/leads`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                feedback.innerText = response.ok ? "Success! You are qualified." : "Error. Please try again.";
            } catch (err) { feedback.innerText = "Connection error."; }
        });
    </script>
</body>
</html>
